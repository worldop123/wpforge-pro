# WPForge Nginx 主配置文件
# 用于独立的 Nginx 反向代理容器

worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml+rss
        application/xml
        application/xhtml+xml
        image/svg+xml
        image/x-icon;

    # 加载 conf.d 下的服务配置
    include /etc/nginx/conf.d/*.conf;
}
