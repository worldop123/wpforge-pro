# WPForge Docker Compose 配置文件
# 用于本地开发和生产部署
# 在项目根目录执行：docker-compose up -d

version: '3.8'

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: wpforge-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-wpforge}
      POSTGRES_USER: ${POSTGRES_USER:-wpforge}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wpforge_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-wpforge}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wpforge-network

  # Redis 缓存和消息队列
  redis:
    image: redis:7-alpine
    container_name: wpforge-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_password} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - wpforge-network

  # 后端 API 服务
  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: wpforge-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wpforge}:${POSTGRES_PASSWORD:-wpforge_password}@postgres:5432/${POSTGRES_DB:-wpforge}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - backend_static:/app/static
      - backend_media:/app/media
      - backend_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3
    networks:
      - wpforge-network

  # Celery Worker
  celery-worker:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: wpforge-celery-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wpforge}:${POSTGRES_PASSWORD:-wpforge_password}@postgres:5432/${POSTGRES_DB:-wpforge}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - backend_static:/app/static
      - backend_media:/app/media
      - backend_logs:/app/logs
    command: celery -A app.tasks worker --loglevel=info --concurrency=4
    networks:
      - wpforge-network

  # Celery Beat (定时任务)
  celery-beat:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: wpforge-celery-beat
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-wpforge}:${POSTGRES_PASSWORD:-wpforge_password}@postgres:5432/${POSTGRES_DB:-wpforge}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - SECRET_KEY=${SECRET_KEY:-your-secret-key-change-in-production}
      - ENVIRONMENT=${ENVIRONMENT:-production}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./backend:/app
      - backend_logs:/app/logs
    command: celery -A app.tasks beat --loglevel=info
    networks:
      - wpforge-network

  # 前端 Web 服务
  frontend:
    build:
      context: .
      dockerfile: docker/Dockerfile.frontend
    container_name: wpforge-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-8080}:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - wpforge-network

  # Nginx 反向代理 (可选，使用 --profile nginx 启用)
  nginx:
    image: nginx:alpine
    container_name: wpforge-nginx
    restart: unless-stopped
    depends_on:
      - backend
      - frontend
    ports:
      - "${NGINX_PORT:-80}:80"
      - "${NGINX_SSL_PORT:-443}:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - wpforge-network
    profiles:
      - nginx

  # 中转服务器 (Relay Server)
  relay-server:
    build:
      context: ./relay-server
      dockerfile: Dockerfile
    container_name: wpforge-relay-server
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      - NODE_ENV=${NODE_ENV:-production}
      - RELAY_PORT=${RELAY_PORT:-3001}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/3
      - JWT_SECRET=${RELAY_JWT_SECRET:-your-relay-secret-change-in-production}
      - API_KEY=${RELAY_API_KEY:-your-relay-api-key}
    ports:
      - "${RELAY_PORT:-3001}:3001"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      start_period: 30s
      retries: 3
    networks:
      - wpforge-network
    profiles:
      - relay

  # Flower - Celery 监控 (可选，使用 --profile monitoring 启用)
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: wpforge-flower
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
      celery-worker:
        condition: service_started
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
    command: celery -A app.tasks flower --port=5555 --basic_auth=${FLOWER_USER:-admin}:${FLOWER_PASSWORD:-admin}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    networks:
      - wpforge-network
    profiles:
      - monitoring

# 数据卷
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_static:
    driver: local
  backend_media:
    driver: local
  backend_logs:
    driver: local
  nginx_logs:
    driver: local

# 网络
networks:
  wpforge-network:
    driver: bridge
    name: wpforge-network
