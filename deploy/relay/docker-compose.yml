version: '3.8'

services:
  # 中转服务器
  relay-server:
    build:
      context: ../../relay-server
      dockerfile: Dockerfile
    container_name: wpforge-relay-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - HOST=0.0.0.0
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:-wpforge-relay-secret-key-change-me}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-admin-api-key-change-me}
      - SUPER_ADMIN_API_KEY=${SUPER_ADMIN_API_KEY:-super-admin-api-key-change-me}
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
    volumes:
      - relay-data:/app/data
      - ./logs:/app/logs
    depends_on:
      - redis
    networks:
      - wpforge-relay-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # 管理面板
  admin-panel:
    build:
      context: ../../relay-admin
      dockerfile: Dockerfile
    container_name: wpforge-admin-panel
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - VITE_API_BASE_URL=${API_BASE_URL:-http://localhost:3001}
    depends_on:
      - relay-server
    networks:
      - wpforge-relay-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Redis
  redis:
    image: redis:7-alpine
    container_name: wpforge-relay-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - wpforge-relay-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Nginx反向代理（可选）
  nginx:
    image: nginx:alpine
    container_name: wpforge-relay-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./ssl:/etc/nginx/ssl:ro
      - ./logs/nginx:/var/log/nginx
    depends_on:
      - relay-server
      - admin-panel
    networks:
      - wpforge-relay-network
    profiles:
      - nginx

volumes:
  relay-data:
    driver: local
  redis-data:
    driver: local

networks:
  wpforge-relay-network:
    driver: bridge
